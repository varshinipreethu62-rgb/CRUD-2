services:
  - type: web
    name: student-management-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: FLASK_ENV
        value: production
